# =========================================================
# Production profile (Railway)
# All secrets come from Railway environment variables.
# NEVER hardcode credentials in this file.
# =========================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway now owns the prod schema. baseline-on-migrate=true lets
# Flyway adopt an existing DB (e.g. one previously managed by
# Hibernate ddl-auto=update) without erroring on startup.
#
# baseline-version=1 tells Flyway to consider the existing schema
# as if V1 has already run (Hibernate built the same tables from
# the same @Entity classes). So the first deploy applies V2..V8
# against the Railway DB without re-running V1's CREATE TABLE.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Let Flyway manage the schema; Hibernate only validates entities
# against it. Change to "none" if validation fails on first boot.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.sql.init.mode=never
