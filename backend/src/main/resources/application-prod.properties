# =========================================================
# Production profile (Railway)
# All secrets come from Railway environment variables.
# NEVER hardcode credentials in this file.
# =========================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway now owns the prod schema. baseline-on-migrate=true lets
# Flyway adopt a pre-existing DB without erroring on startup. On a
# fresh/empty database (which is what we have after running
# init-prod.sql), Flyway just runs V1..V8 in order from scratch.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Flyway owns the schema; Hibernate should not touch or validate it.
# (Some JPA entities use Long for ids where migrations use INT — this
# is safe at the JDBC level but would fail strict validation.)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.sql.init.mode=never
